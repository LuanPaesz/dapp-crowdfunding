name: BlockFund CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  frontend:
    name: Frontend Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  smart-contract:
    name: Smart Contract Checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: smart-contract

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: smart-contract/package-lock.json

      - name: Install smart contract dependencies
        run: npm ci

      - name: Run Solhint
        run: npm run lint:sol

      - name: Run Hardhat tests
        run: npx hardhat test